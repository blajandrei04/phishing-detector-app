<div class="login-wrapper">
  <!-- Interactive animated background blobs -->
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  
  <div class="glass-card">
    <div class="card-header">
      <div class="logo">
        <svg xmlns="http://www.w3.org/2000/svg" width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="feather feather-shield">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
        </svg>
      </div>
      <h2>Welcome Back</h2>
      <p>Sign in to access your dashboard</p>
    </div>

    <!-- Error Message Alert -->
    <div class="alert alert-danger" *ngIf="authFacade.error$ | async as error">
      {{ error }}
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      
      <div class="form-field">
        <label for="username">Username</label>
        <div class="input-wrapper">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
            <circle cx="12" cy="7" r="4"></circle>
          </svg>
          <input 
            type="text" 
            id="username" 
            class="custom-input"
            formControlName="username" 
            placeholder="Enter your username"
            [class.is-invalid]="loginForm.get('username')?.invalid && loginForm.get('username')?.touched">
        </div>
      </div>

      <div class="form-field">
        <label for="password">Password</label>
        <div class="input-wrapper">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
          </svg>
          <input 
            type="password" 
            id="password" 
            class="custom-input"
            formControlName="password" 
            placeholder="Enter your password"
            [class.is-invalid]="loginForm.get('password')?.invalid && loginForm.get('password')?.touched">
        </div>
        <div class="forgot-wrapper">
          <a href="#" class="forgot-link" (click)="$event.preventDefault()">Forgot password?</a>
        </div>
      </div>

      <div class="actions">
        <button 
          type="submit" 
          class="submit-btn" 
          [disabled]="(authFacade.isLoading$ | async)">
          <span *ngIf="!(authFacade.isLoading$ | async)">Login securely</span>
          <div class="spinner" *ngIf="authFacade.isLoading$ | async"></div>
        </button>
      </div>
      
    </form>
    
    <div class="auth-footer">
      <p>Don't have an account? <a href="#" class="register-link" (click)="$event.preventDefault()">Sign up</a></p>
    </div>
    
    <div class="hints">
        <p><i>Demo credentials: <strong>admin / thesis</strong></i></p>
    </div>
  </div>
</div>
